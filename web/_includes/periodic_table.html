{% assign pt = site.data.periodic_table %}
<ul class="ptor-legend">
  {% for cat in pt.categories %}
  <li class="ptor-cat-{{ cat.key }}"><span class="ptor-swatch"></span>{{ cat.label }}</li>
  {% endfor %}
</ul>

<div class="ptor-scroll">
  <div class="ptor-grid">
    {% for el in pt.elements %}
    <a href="/periodic-table/{{ el.slug }}.html"
       class="ptor-tile ptor-cat-{{ el.category }}"
       style="grid-row: {{ el.row }}; grid-column: {{ el.col }};"
       title="{{ el.name }} — {{ el.blurb }}">
      <span class="ptor-number">{{ el.number }}</span>
      <span class="ptor-code">{{ el.code }}</span>
      <span class="ptor-name">{{ el.name }}</span>
    </a>
    {% endfor %}
  </div>
</div>
