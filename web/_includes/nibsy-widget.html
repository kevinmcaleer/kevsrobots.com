<style>
/* ============================================
   NIBSY WIDGET — FIXED POSITION ASSISTANT
   ============================================ */

#nibsy-widget {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
  pointer-events: none;
}

#nibsy-widget * {
  pointer-events: auto;
}

#nibsy-widget .nibsy-char {
  width: 200px;
  height: 240px;
  cursor: pointer;
  position: relative;
  transition: filter 0.2s ease;
}

#nibsy-widget .nibsy-char:hover {
  filter: drop-shadow(0 2px 8px rgba(74, 144, 217, 0.4));
}

/* ---- Entrance animation ---- */

#nibsy-widget .nibsy-stage {
  position: relative;
  overflow: visible;
}

#nibsy-widget.nibsy-entering .nibsy-char {
  animation: nibsy-walk-on 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes nibsy-walk-on {
  0% {
    transform: translateX(220px) rotate(5deg);
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  40% {
    transform: translateX(10px) rotate(-3deg);
  }
  60% {
    transform: translateX(-5px) rotate(2deg);
  }
  80% {
    transform: translateX(3px) rotate(-1deg);
  }
  100% {
    transform: translateX(0) rotate(0deg);
  }
}

/* ---- Exit animation ---- */

#nibsy-widget.nibsy-exiting .nibsy-char {
  animation: nibsy-walk-off 0.6s ease-in forwards;
}

@keyframes nibsy-walk-off {
  0% {
    transform: translateX(0) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateX(220px) rotate(5deg);
    opacity: 0;
  }
}

/* ---- Hidden state ---- */

#nibsy-widget.nibsy-hidden .nibsy-char,
#nibsy-widget.nibsy-hidden .nibsy-menu,
#nibsy-widget.nibsy-hidden .nibsy-widget-speech {
  display: none;
}

#nibsy-widget.nibsy-hidden .nibsy-show-btn {
  display: flex;
}

.nibsy-show-btn {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: white;
  border: 2px solid #D0D0D0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  transition: all 0.2s ease;
  z-index: 10000;
}

.nibsy-show-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}

/* ---- Menu ---- */

.nibsy-menu {
  position: absolute;
  bottom: 100%;
  right: 0;
  margin-bottom: 8px;
  background: white;
  border: 2px solid #D0D0D0;
  border-radius: 16px;
  padding: 12px 8px 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  transform: scale(0) translateY(10px);
  transform-origin: bottom right;
  opacity: 0;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s ease;
  pointer-events: none;
  min-width: 200px;
}

.nibsy-menu.open {
  transform: scale(1) translateY(0);
  opacity: 1;
  pointer-events: auto;
}

.nibsy-menu::after {
  content: '';
  position: absolute;
  bottom: -8px;
  right: 55px;
  width: 0;
  height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 8px solid white;
}

.nibsy-menu::before {
  content: '';
  position: absolute;
  bottom: -10px;
  right: 54px;
  width: 0;
  height: 0;
  border-left: 9px solid transparent;
  border-right: 9px solid transparent;
  border-top: 9px solid #D0D0D0;
}

.nibsy-menu-header {
  font-size: 13px;
  font-weight: 600;
  color: #666;
  padding: 0 8px 8px;
  border-bottom: 1px solid #eee;
  margin-bottom: 4px;
}

.nibsy-menu-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 10px;
  color: #333;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: background 0.15s ease;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.nibsy-menu-item:hover {
  background: #f0f4f8;
  color: #333;
  text-decoration: none;
}

.nibsy-menu-item i {
  width: 20px;
  text-align: center;
  color: #4A90D9;
  font-size: 15px;
}

.nibsy-menu-divider {
  height: 1px;
  background: #eee;
  margin: 4px 8px;
}

.nibsy-menu-item.nibsy-hide-btn {
  color: #999;
  font-size: 13px;
}

.nibsy-menu-item.nibsy-hide-btn:hover {
  background: #fff0f0;
  color: #cc4444;
}

.nibsy-menu-item.nibsy-hide-btn i {
  color: #999;
  font-size: 13px;
}

.nibsy-menu-item.nibsy-hide-btn:hover i {
  color: #cc4444;
}

/* ---- Speech bubble (widget version) ---- */

.nibsy-widget-speech {
  position: absolute;
  bottom: 100%;
  right: 0;
  margin-bottom: 8px;
  background: white;
  border: 2px solid #D0D0D0;
  border-radius: 14px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  color: #333;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  transform: scale(0);
  transform-origin: bottom right;
  opacity: 0;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s ease;
  pointer-events: none;
  max-width: 220px;
  white-space: normal;
  line-height: 1.4;
}

.nibsy-widget-speech.has-link {
  pointer-events: auto;
}

.nibsy-tip-nav {
  display: none;
  justify-content: space-between;
  margin-top: 6px;
  gap: 6px;
}

.nibsy-widget-speech.has-nav .nibsy-tip-nav {
  display: flex;
}

.nibsy-tip-nav button {
  background: #eee;
  border: 1px solid #ccc;
  border-radius: 4px;
  width: 28px;
  height: 22px;
  font-size: 12px;
  font-weight: 700;
  color: #555;
  cursor: pointer;
  padding: 0;
  line-height: 20px;
}

.nibsy-tip-nav button:hover {
  background: #ddd;
  color: #333;
}

.nibsy-widget-speech a {
  color: #4A90D9;
  text-decoration: underline;
  font-weight: 600;
}

.nibsy-widget-speech a:hover {
  color: #2a6cb5;
}

.nibsy-widget-speech::after {
  content: '';
  position: absolute;
  bottom: -8px;
  right: 55px;
  width: 0;
  height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 8px solid white;
}

.nibsy-widget-speech::before {
  content: '';
  position: absolute;
  bottom: -10px;
  right: 54px;
  width: 0;
  height: 0;
  border-left: 9px solid transparent;
  border-right: 9px solid transparent;
  border-top: 9px solid #D0D0D0;
}

.nibsy-widget-speech.visible {
  transform: scale(1);
  opacity: 1;
}

/* ---- Idle animations ---- */

@keyframes nw-bob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}

@keyframes nw-antenna-wobble {
  0%, 100% { transform: rotate(0deg); }
  30%      { transform: rotate(4deg); }
  70%      { transform: rotate(-4deg); }
}

@keyframes nw-blink {
  0%   { transform: scaleY(1); }
  40%  { transform: scaleY(0.05); }
  60%  { transform: scaleY(0.05); }
  100% { transform: scaleY(1); }
}

@keyframes nw-breathe {
  0%, 100% { transform: scale(1, 1); }
  50%      { transform: scale(1.01, 1.008); }
}

#nibsy-widget.nibsy-idle .nibsy-char svg {
  animation: nw-bob 3s ease-in-out infinite;
}

#nibsy-widget.nibsy-idle #nw-antenna {
  animation: nw-antenna-wobble 2.5s ease-in-out infinite;
  transform-origin: 100px 88px;
}

#nibsy-widget.nibsy-idle #nw-body-shape {
  animation: nw-breathe 4s ease-in-out infinite;
  transform-origin: 100px 150px;
}

#nibsy-widget.nibsy-blinking #nw-eye-left,
#nibsy-widget.nibsy-blinking #nw-eye-right {
  animation: nw-blink 0.18s ease-in-out forwards;
}

#nw-eye-left  { transform-origin: 78px 128px; }
#nw-eye-right { transform-origin: 122px 128px; }

/* ---- Sleep animations ---- */

@keyframes nw-sleep-bob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(2px); }
}

@keyframes nw-zzz-float {
  0%   { transform: translate(0, 0) scale(0.5); opacity: 0; }
  20%  { opacity: 1; }
  100% { transform: translate(15px, -30px) scale(1.2); opacity: 0; }
}

@keyframes nw-zzz-float-2 {
  0%   { transform: translate(0, 0) scale(0.4); opacity: 0; }
  25%  { opacity: 0.8; }
  100% { transform: translate(20px, -35px) scale(1); opacity: 0; }
}

@keyframes nw-zzz-float-3 {
  0%   { transform: translate(0, 0) scale(0.3); opacity: 0; }
  30%  { opacity: 0.6; }
  100% { transform: translate(12px, -28px) scale(0.9); opacity: 0; }
}

@keyframes nw-head-droop {
  0%, 100% { transform: rotate(0deg); }
  50%      { transform: rotate(5deg); }
}

#nibsy-widget.nibsy-sleeping .nibsy-char svg {
  animation: nw-sleep-bob 4s ease-in-out infinite;
}

#nibsy-widget.nibsy-sleeping #nw-body-shape {
  animation: nw-breathe 5s ease-in-out infinite;
  transform-origin: 100px 150px;
}

#nibsy-widget.nibsy-sleeping #nw-antenna {
  animation: nw-head-droop 3s ease-in-out infinite;
  transform-origin: 100px 88px;
}

#nibsy-widget.nibsy-sleeping #nw-eye-left,
#nibsy-widget.nibsy-sleeping #nw-eye-right {
  display: none;
}

#nibsy-widget.nibsy-sleeping .nw-eye-highlight {
  display: none;
}

#nw-eye-left-closed,
#nw-eye-right-closed {
  display: none;
}

#nibsy-widget.nibsy-sleeping #nw-eye-left-closed,
#nibsy-widget.nibsy-sleeping #nw-eye-right-closed {
  display: block;
}

#nw-mouth-sleep, #nw-mouth-giggle { display: none; }
#nibsy-widget.nibsy-sleeping #nw-mouth-normal { display: none; }
#nibsy-widget.nibsy-sleeping #nw-mouth-sleep { display: block; }
#nibsy-widget.nibsy-giggling #nw-mouth-normal { display: none; }
#nibsy-widget.nibsy-giggling #nw-mouth-giggle { display: block; }

#nw-zzz { display: none; }
#nibsy-widget.nibsy-sleeping #nw-zzz { display: block; }

#nibsy-widget.nibsy-sleeping #nw-zzz-1 {
  animation: nw-zzz-float 2.5s ease-out infinite;
}
#nibsy-widget.nibsy-sleeping #nw-zzz-2 {
  animation: nw-zzz-float-2 2.5s ease-out infinite 0.8s;
}
#nibsy-widget.nibsy-sleeping #nw-zzz-3 {
  animation: nw-zzz-float-3 2.5s ease-out infinite 1.6s;
}

/* ---- Giggle animation ---- */

@keyframes nw-giggle-shake {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  10%  { transform: translateY(-3px) rotate(-2deg); }
  20%  { transform: translateY(0) rotate(2deg); }
  30%  { transform: translateY(-4px) rotate(-1deg); }
  40%  { transform: translateY(0) rotate(1deg); }
  50%  { transform: translateY(-2px) rotate(-2deg); }
  60%  { transform: translateY(0) rotate(1deg); }
  70%  { transform: translateY(-3px) rotate(-1deg); }
  80%  { transform: translateY(0) rotate(0deg); }
}

@keyframes nw-antenna-boing {
  0%   { transform: rotate(0deg); }
  15%  { transform: rotate(15deg); }
  30%  { transform: rotate(-12deg); }
  45%  { transform: rotate(8deg); }
  60%  { transform: rotate(-5deg); }
  75%  { transform: rotate(3deg); }
  100% { transform: rotate(0deg); }
}

@keyframes nw-cheek-blush {
  0%, 100% { opacity: 0.5; }
  30%      { opacity: 0.9; }
}

#nibsy-widget.nibsy-giggling .nibsy-char svg {
  animation: nw-giggle-shake 0.8s ease-in-out;
}

#nibsy-widget.nibsy-giggling #nw-antenna {
  animation: nw-antenna-boing 0.8s ease-in-out !important;
  transform-origin: 100px 88px;
}

#nibsy-widget.nibsy-giggling #nw-cheeks circle {
  animation: nw-cheek-blush 0.8s ease-in-out;
}

#nw-antenna { cursor: pointer; }

/* ---- Idle fidget animations ---- */

/* Think: eyes look up, thought bubble appears */
#nw-thought { display: none; }
#nibsy-widget.nibsy-thinking #nw-thought { display: block; }

@keyframes nw-thought-appear {
  0%   { transform: scale(0); opacity: 0; }
  20%  { transform: scale(1.1); opacity: 1; }
  80%  { transform: scale(1); opacity: 1; }
  100% { transform: scale(0); opacity: 0; }
}

@keyframes nw-eyes-look-up {
  0%, 100% { transform: translateY(0); }
  20%, 80% { transform: translateY(-3px); }
}

#nibsy-widget.nibsy-thinking #nw-thought {
  animation: nw-thought-appear 3s ease-in-out forwards;
  transform-origin: 45px 20px;
}

#nibsy-widget.nibsy-thinking #nw-eyes {
  animation: nw-eyes-look-up 3s ease-in-out;
}

/* Look around: eyes glance left then right */
@keyframes nw-look-around {
  0%, 100% { transform: translateX(0); }
  20%, 35% { transform: translateX(-3px); }
  45%      { transform: translateX(0); }
  60%, 75% { transform: translateX(3px); }
  90%      { transform: translateX(0); }
}

#nibsy-widget.nibsy-looking #nw-eyes {
  animation: nw-look-around 2.5s ease-in-out;
}

/* Wave: right arm wiggles */
@keyframes nw-wave {
  0%, 100% { transform: rotate(20deg); }
  15%      { transform: rotate(-15deg); }
  30%      { transform: rotate(-25deg); }
  45%      { transform: rotate(-10deg); }
  60%      { transform: rotate(-25deg); }
  75%      { transform: rotate(-15deg); }
  90%      { transform: rotate(10deg); }
}

#nibsy-widget.nibsy-waving #nw-arm-right {
  animation: nw-wave 1.5s ease-in-out;
  transform-origin: 142px 152px;
}

/* Wiggle/dance: body shimmies side to side */
@keyframes nw-wiggle {
  0%, 100% { transform: translateX(0) rotate(0deg); }
  15%      { transform: translateX(-3px) rotate(-2deg); }
  30%      { transform: translateX(3px) rotate(2deg); }
  45%      { transform: translateX(-3px) rotate(-2deg); }
  60%      { transform: translateX(3px) rotate(2deg); }
  75%      { transform: translateX(-2px) rotate(-1deg); }
  90%      { transform: translateX(0) rotate(0deg); }
}

@keyframes nw-arm-dance-left {
  0%, 100% { transform: rotate(-20deg); }
  25%      { transform: rotate(-35deg); }
  50%      { transform: rotate(-15deg); }
  75%      { transform: rotate(-30deg); }
}

@keyframes nw-arm-dance-right {
  0%, 100% { transform: rotate(20deg); }
  25%      { transform: rotate(35deg); }
  50%      { transform: rotate(15deg); }
  75%      { transform: rotate(30deg); }
}

#nibsy-widget.nibsy-wiggling .nibsy-char svg {
  animation: nw-wiggle 1.8s ease-in-out;
}

#nibsy-widget.nibsy-wiggling #nw-arm-left {
  animation: nw-arm-dance-left 0.9s ease-in-out 2;
  transform-origin: 58px 152px;
}

#nibsy-widget.nibsy-wiggling #nw-arm-right {
  animation: nw-arm-dance-right 0.9s ease-in-out 2;
  transform-origin: 142px 152px;
}

/* Curious tilt: body leans to one side */
@keyframes nw-tilt {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25%, 70% { transform: translateY(-2px) rotate(8deg); }
}

#nibsy-widget.nibsy-tilting .nibsy-char svg {
  animation: nw-tilt 2s ease-in-out;
  transform-origin: 100px 200px;
}

/* Bounce: excited hop */
@keyframes nw-bounce {
  0%, 100% { transform: translateY(0) scaleY(1); }
  10%      { transform: translateY(0) scaleY(0.92); }
  25%      { transform: translateY(-12px) scaleY(1.05); }
  40%      { transform: translateY(0) scaleY(0.95); }
  55%      { transform: translateY(-6px) scaleY(1.02); }
  70%      { transform: translateY(0) scaleY(0.98); }
  85%      { transform: translateY(-2px) scaleY(1); }
}

#nibsy-widget.nibsy-bouncing .nibsy-char svg {
  animation: nw-bounce 1.2s ease-in-out;
}

/* Peek: peeks sideways */
@keyframes nw-peek {
  0%, 100% { transform: translateX(0) rotate(0deg); }
  20%, 75% { transform: translateX(8px) rotate(-3deg); }
}

@keyframes nw-peek-eyes {
  0%, 100% { transform: translateX(0); }
  20%, 75% { transform: translateX(3px); }
}

#nibsy-widget.nibsy-peeking .nibsy-char svg {
  animation: nw-peek 2.5s ease-in-out;
  transform-origin: 100px 200px;
}

#nibsy-widget.nibsy-peeking #nw-eyes {
  animation: nw-peek-eyes 2.5s ease-in-out;
}

/* ---- Click surprised reaction ---- */

#nw-mouth-surprised { display: none; }
#nibsy-widget.nibsy-surprised #nw-mouth-normal { display: none; }
#nibsy-widget.nibsy-surprised #nw-mouth-surprised { display: block; }

@keyframes nw-surprise-blink {
  0%   { transform: scaleY(1); }
  15%  { transform: scaleY(0.05); }
  30%  { transform: scaleY(1); }
  55%  { transform: scaleY(0.05); }
  70%  { transform: scaleY(1); }
  100% { transform: scaleY(1); }
}

@keyframes nw-mouth-pop {
  0%   { transform: scale(0.5); opacity: 0.5; }
  20%  { transform: scale(1.2); opacity: 1; }
  40%  { transform: scale(1); opacity: 1; }
  70%  { transform: scale(0.8); opacity: 0.8; }
  100% { transform: scale(0); opacity: 0; }
}

#nibsy-widget.nibsy-surprised #nw-eyes {
  animation: nw-surprise-blink 0.5s ease-in-out;
  transform-origin: 100px 128px;
}

#nibsy-widget.nibsy-surprised #nw-mouth-surprised {
  animation: nw-mouth-pop 0.5s ease-in-out forwards;
  transform-origin: 100px 152px;
}
</style>

<script>
(function() {
  const widget = document.getElementById('nibsy-widget');

  const eyeRight = document.getElementById('nw-eye-right');

  // --- Nibsy API integration (#71) ---
  const NIBSY_API = 'https://nibsy.kevsrobots.com';
  const nibsySession = sessionStorage.getItem('nibsy-sid') || (() => {
    const sid = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
    sessionStorage.setItem('nibsy-sid', sid);
    return sid;
  })();
  let apiTips = null;

  function sendBeaconJSON(path, data) {
    try {
      const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
      navigator.sendBeacon(NIBSY_API + path, blob);
    } catch (e) { /* non-critical */ }
  }

  function trackClick(contentId, url) {
    sendBeaconJSON('/api/track/click', {
      content_id: contentId,
      content_url: url,
      source_page: window.location.pathname,
      session_id: nibsySession
    });
  }

  function trackImpressions(contentIds) {
    sendBeaconJSON('/api/track/impression', {
      content_ids: contentIds,
      source_page: window.location.pathname,
      session_id: nibsySession
    });
  }

  async function fetchRecommendations() {
    try {
      const page = window.location.pathname;
      const res = await fetch(NIBSY_API + '/api/recommendations?page=' + encodeURIComponent(page) + '&limit=6');
      if (!res.ok) return;
      const data = await res.json();
      const recs = data.recommendations || [];
      if (recs.length === 0) return;
      apiTips = recs.map(r => ({
        text: r.title,
        html: (r.reason ? r.reason + ' — ' : '') + '<a href="' + r.url + '" data-nibsy-id="' + r.content_id + '" data-nibsy-url="' + r.url + '">' + r.title + '</a>',
        duration: 6000,
        contentId: r.content_id,
        url: r.url
      }));
      trackImpressions(recs.map(r => r.content_id));
    } catch (e) { /* fall back to hardcoded tips */ }
  }

  async function fetchTrending() {
    try {
      const res = await fetch(NIBSY_API + '/api/trending?period=7d&limit=5');
      if (!res.ok) return null;
      const data = await res.json();
      return data.trending || [];
    } catch (e) { return null; }
  }

  let menuOpen = false;
  let blinkTimer = null;
  let speechTimer = null;
  let inactivityTimer = null;
  let inactivitySeconds = 0;

  const EYE_LEFT_CX = 78;
  const EYE_LEFT_CY = 128;
  const EYE_RIGHT_CX = 122;
  const EYE_RIGHT_CY = 128;
  const EYE_MAX_OFFSET = 3.5;

  // --- Entrance ---

  function init() {
    if (hidden) {
      widget.classList.remove('nibsy-entering');
      widget.classList.add('nibsy-hidden');
      return;
    }

    widget.classList.add('nibsy-entering');
    setTimeout(() => {
      widget.classList.remove('nibsy-entering');
      widget.classList.add('nibsy-idle');
      startBlinking();
      startEyeTracking();
      startInactivityWatch();
      showSpeech("Hi! I'm Nibsy! Click me for help 😊", 4000);

      setTimeout(() => { if (shouldShowCTA()) setTimeout(showCTA, CTA_DELAY_MS); else scheduleCTA(); }, 100);
      fetchRecommendations();
      setTimeout(scheduleNavTip, 12000);
      scheduleFidget();

  }

  // --- Page awareness ---

  function getPageContext() {
    const path = window.location.pathname;
    if (path === '/' || path === '/index.html') return 'home';
    if (path.startsWith('/blog')) return 'blog';
    if (path.startsWith('/learn')) return 'learn';
    if (path.startsWith('/reviews')) return 'reviews';
    if (path.startsWith('/robots')) return 'ideas';
    if (path.startsWith('/all_videos') || path.startsWith('/videos')) return 'videos';
    if (path.startsWith('/search')) return 'search';
    if (path.startsWith('/about')) return 'about';
    if (path.startsWith('/groups')) return 'groups';
    if (path.startsWith('/gear')) return 'gear';
    return 'other';
  }

  const contextMessages = {
    home:    ["Welcome to KevsRobots!", "Hey there, welcome back!", "Good to see you!"],
    blog:    ["You've found the blog!", "Lots of maker news here!", "Check out the latest posts!"],
    learn:   ["Ready to learn something new?", "Great courses await you here!", "Level up your skills!"],
    reviews: ["Looking for a review?", "Honest takes on maker gear!", "Find the right kit here!"],
    ideas:   ["Need project inspiration?", "So many robots to build!", "Find your next project here!"],
    videos:  ["Grab some popcorn!", "Lots of videos to watch!", "See builds come to life!"],
    search:  ["Looking for something?", "I can help you find things!", "Let's find it together!"],

  // --- Navigation tips (gentle, frequent nudges) ---

  const TIPS_INTERVAL_MS = 20 * 1000;
  let tipsTimer = null;

  const navTips = [
    // Site sections
    { text: 'Looking for project ideas?', html: 'Looking for project ideas? <a href="/robots/">Browse projects</a>', duration: 5000 },
    { text: 'Want to learn something new?', html: 'Want to learn something new? <a href="/learn/">Start a course</a>', duration: 5000 },
    { text: 'Fancy watching some videos?', html: 'Fancy watching some videos? <a href="/all_videos">Watch now</a>', duration: 5000 },
    { text: 'Curious about a product?', html: 'Curious about a product? <a href="/reviews/">Read reviews</a>', duration: 5000 },
    { text: 'Check out the latest blog posts!', html: 'Check out the latest posts! <a href="/blog/">Read the blog</a>', duration: 5000 },
    { text: 'Looking for something specific?', html: 'Looking for something specific? <a href="/search">Search the site</a>', duration: 5000 },
    { text: 'Need some robot inspiration?', html: 'Need some robot inspiration? <a href="/robots/">Get ideas</a>', duration: 5000 },
    { text: 'Have you seen the courses?', html: 'Have you seen the courses? <a href="/learn/">Take a look</a>', duration: 5000 },
    { text: 'Want to see what I can build?', html: 'Want to see what I can build? <a href="/all_videos">Watch a video</a>', duration: 5000 },
    // Idea categories
    { text: 'Into 3D design?', html: 'Into 3D design? <a href="/ideas/3ddesign.html">3D design ideas</a>', duration: 5000 },
    { text: 'Into 3D printing?', html: 'Into 3D printing? <a href="/ideas/3dprinting.html">3D printing ideas</a>', duration: 5000 },
    { text: 'Try some AI projects!', html: 'Try some AI projects? <a href="/ideas/ai.html">AI ideas</a>', duration: 5000 },
    { text: 'Interested in Arduino?', html: 'Interested in Arduino? <a href="/ideas/arduino.html">Arduino ideas</a>', duration: 5000 },
    { text: 'Explore electronics!', html: 'Explore electronics! <a href="/ideas/electronics.html">Electronics ideas</a>', duration: 5000 },
    { text: 'Love making games?', html: 'Love making games? <a href="/ideas/games.html">Game ideas</a>', duration: 5000 },
    { text: 'Got a green thumb?', html: 'Got a green thumb? <a href="/ideas/garden.html">Garden ideas</a>', duration: 5000 },
    { text: 'Feeling hacky?', html: 'Feeling hacky? <a href="/ideas/hacks.html">Hack ideas</a>', duration: 5000 },
    { text: 'Love Halloween?', html: 'Love Halloween? <a href="/ideas/halloween.html">Spooky ideas</a>', duration: 5000 },
    { text: 'Fancy some laser cutting?', html: 'Fancy some laser cutting? <a href="/ideas/lasercutting.html">Laser cutting ideas</a>', duration: 5000 },
    { text: 'Love Lego?', html: 'Love Lego? <a href="/ideas/lego.html">Lego ideas</a>', duration: 5000 },
    { text: 'Love MicroPython?', html: 'Love MicroPython? <a href="/ideas/micropython.html">MicroPython ideas</a>', duration: 5000 },
    { text: 'Make some music!', html: 'Make some music! <a href="/ideas/music.html">Music ideas</a>', duration: 5000 },
    { text: 'Design your own PCBs!', html: 'Design your own PCBs! <a href="/ideas/pcb.html">PCB ideas</a>', duration: 5000 },
    { text: 'Projects for your pets!', html: 'Projects for your pets! <a href="/ideas/pets.html">Pet ideas</a>', duration: 5000 },
    { text: 'Into photography?', html: 'Into photography? <a href="/ideas/photography.html">Photography ideas</a>', duration: 5000 },
    { text: 'Love the Pico?', html: 'Love the Pico? <a href="/ideas/pico.html">Pico ideas</a>', duration: 5000 },
    { text: 'Boost your productivity!', html: 'Boost your productivity! <a href="/ideas/productivity.html">Productivity ideas</a>', duration: 5000 },
    { text: 'Love Python?', html: 'Love Python? <a href="/ideas/python.html">Python ideas</a>', duration: 5000 },
    { text: 'Raspberry Pi projects!', html: 'Raspberry Pi projects! <a href="/ideas/raspberrypi.html">Take a look</a>', duration: 5000 },
    { text: 'Feeling retro?', html: 'Feeling retro? <a href="/ideas/retro.html">Retro ideas</a>', duration: 5000 },
    { text: 'Robot arms are cool!', html: 'Robot arms are cool! <a href="/ideas/robotarms.html">Robot arm ideas</a>', duration: 5000 },
    { text: 'Want to build a robot?', html: 'Want to build a robot? <a href="/ideas/robots.html">Robot ideas</a>', duration: 5000 },
    { text: 'Seasonal projects!', html: 'Seasonal projects! <a href="/ideas/seasonal.html">Seasonal ideas</a>', duration: 5000 },
    { text: 'Need a stand or case?', html: 'Need a stand or case? <a href="/ideas/stands-and-cases.html">Stands &amp; cases</a>', duration: 5000 },
    { text: 'Make something wearable!', html: 'Make something wearable! <a href="/ideas/wearable.html">Wearable ideas</a>', duration: 5000 },
    { text: 'Fancy something weird?', html: 'Fancy something weird? <a href="/ideas/weird.html">Weird ideas</a>', duration: 5000 }
  ];

  let lastTipIndex = -1;

  function activeTips() { return apiTips || navTips; }

  function showNavTip(force) {
    if (!force && (hidden || sleeping || menuOpen || giggling || surprising)) {
      scheduleNavTip();
      return;
    }
    if (!force && speech.classList.contains('visible')) {
      scheduleNavTip();
      return;
    }
    const tips = activeTips();
    let idx;
    do { idx = Math.floor(Math.random() * tips.length); } while (idx === lastTipIndex && tips.length > 1);
    lastTipIndex = idx;
    showTipByIndex(idx);
    scheduleNavTip();
  }

  function showTipByIndex(idx) {
    const tips = activeTips();
    lastTipIndex = idx;
    const tip = tips[idx];
    showSpeech(tip.html, tip.duration, true, true);
  }

  function showPrevTip() {
    const tips = activeTips();
    const idx = lastTipIndex <= 0 ? tips.length - 1 : lastTipIndex - 1;
    showTipByIndex(idx);
    scheduleNavTip();
  }

  function showNextTip() {
    const tips = activeTips();
    const idx = lastTipIndex >= tips.length - 1 ? 0 : lastTipIndex + 1;
    showTipByIndex(idx);
    scheduleNavTip();
  }

  tipPrevBtn.addEventListener('click', (e) => { e.stopPropagation(); showPrevTip(); });
  tipNextBtn.addEventListener('click', (e) => { e.stopPropagation(); showNextTip(); });

  function scheduleNavTip() {
    if (tipsTimer) clearTimeout(tipsTimer);
    tipsTimer = setTimeout(showNavTip, TIPS_INTERVAL_MS);
  }

  function stopNavTips() {
    if (tipsTimer) { clearTimeout(tipsTimer); tipsTimer = null; }
  }

  // --- Promotional CTAs ---

  const CTA_INTERVAL_MS = 5 * 60 * 1000;
  const CTA_DELAY_MS = 30 * 1000;

  const ctaMessages = [
    {
      html: '📺 Love robots? <a href="https://www.youtube.com/@kevinmcaleer28?sub_confirmation=1" target="_blank">Subscribe on YouTube</a> for weekly builds!',
      duration: 8000
    },
    {
      html: '📬 Get the weekly newsletter! <a href="/newsletter" target="_blank">Join the list</a> for tips & projects.',
      duration: 8000
    },
    {
      html: '💬 Join our maker community on <a href="/discord" target="_blank">Discord</a>!',
      duration: 8000
    },
    {
      html: '🔔 Never miss a build — <a href="https://www.youtube.com/@kevinmcaleer28?sub_confirmation=1" target="_blank">subscribe on YouTube</a>!',
      duration: 8000
    },
    {
      html: '✉️ Weekly maker tips in your inbox — <a href="/newsletter" target="_blank">sign up here</a>!',
      duration: 8000
    },
    {
      html: '🤖 Chat with other makers on <a href="/discord" target="_blank">Discord</a>!',
      duration: 8000
    }
  ];

  let ctaTimer = null;

  function shouldShowCTA() {
    const lastShown = parseInt(localStorage.getItem('nibsy-cta-last') || '0', 10);
    return Date.now() - lastShown > CTA_INTERVAL_MS;
  }

  function showCTA() {
    if (hidden || sleeping || menuOpen || giggling || surprising) return;
    if (!shouldShowCTA()) return;
    const cta = ctaMessages[Math.floor(Math.random() * ctaMessages.length)];
    showSpeech(cta.html, cta.duration, true);
    localStorage.setItem('nibsy-cta-last', String(Date.now()));
    scheduleCTA();
  }

  function scheduleCTA() {
    if (ctaTimer) clearTimeout(ctaTimer);
    ctaTimer = setTimeout(showCTA, CTA_INTERVAL_MS);
  }

  // --- Eye tracking ---

  function startEyeTracking() {
    document.addEventListener('mousemove', onMouseMove);
  }

  function stopEyeTracking() {
    document.removeEventListener('mousemove', onMouseMove);
    eyeLeft.setAttribute('cx', EYE_LEFT_CX);
    eyeLeft.setAttribute('cy', EYE_LEFT_CY);
    eyeRight.setAttribute('cx', EYE_RIGHT_CX);
    eyeRight.setAttribute('cy', EYE_RIGHT_CY);
  }

  function onMouseMove(e) {
    if (hidden) return;
    if (sleeping) { wakeUp(); return; }
    resetInactivity();

    const rect = svgEl.getBoundingClientRect();
    const svgCenterX = rect.left + rect.width / 2;
    const svgCenterY = rect.top + rect.height * 0.53;

    const dx = e.clientX - svgCenterX;
    const dy = e.clientY - svgCenterY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    const maxDist = Math.max(window.innerWidth, window.innerHeight) * 0.5;
    const factor = Math.min(dist / maxDist, 1);

    const angle = Math.atan2(dy, dx);
    const offsetX = Math.cos(angle) * EYE_MAX_OFFSET * factor;
    const offsetY = Math.sin(angle) * EYE_MAX_OFFSET * factor;

    eyeLeft.setAttribute('cx', EYE_LEFT_CX + offsetX);
    eyeLeft.setAttribute('cy', EYE_LEFT_CY + offsetY);
    eyeRight.setAttribute('cx', EYE_RIGHT_CX + offsetX);
    eyeRight.setAttribute('cy', EYE_RIGHT_CY + offsetY);
  }

  // --- Inactivity / Sleep ---

  function startInactivityWatch() {
    document.addEventListener('keydown', resetInactivity);
    document.addEventListener('click', resetInactivity);
    document.addEventListener('scroll', resetInactivity);
    inactivitySeconds = 0;
    inactivityTimer = setInterval(() => {
      if (hidden || sleeping) return;
      inactivitySeconds++;
      if (inactivitySeconds >= 30) {
        goToSleep();
      }
    }, 1000);
  }

  function resetInactivity() {
    inactivitySeconds = 0;
    if (sleeping) wakeUp();
  }

  function goToSleep() {
    if (sleeping || hidden) return;
    sleeping = true;
    stopBlinking();
    stopFidgets();
    widget.classList.remove('nibsy-idle');
    widget.classList.add('nibsy-sleeping');
  }

  function wakeUp() {
    if (!sleeping) return;
    sleeping = false;
    widget.classList.remove('nibsy-sleeping');
    widget.classList.add('nibsy-idle');
    startBlinking();
    scheduleFidget();
    showSpeech("*yawn* ...oh, hi! 😊", 2500);

    eyeLeft.setAttribute('cx', EYE_LEFT_CX);
    eyeLeft.setAttribute('cy', EYE_LEFT_CY);
    eyeRight.setAttribute('cx', EYE_RIGHT_CX);
    eyeRight.setAttribute('cy', EYE_RIGHT_CY);
  }

  // --- Blinking ---

  function startBlinking() {
    scheduleBlink();
  }

  function stopBlinking() {
    if (blinkTimer) { clearTimeout(blinkTimer); blinkTimer = null; }
  }

  function scheduleBlink() {
    if (sleeping) return;
    blinkTimer = setTimeout(() => {
      doBlink();
    }, 2500 + Math.random() * 4500);
  }

  function doBlink() {
    if (sleeping) return;
    widget.classList.add('nibsy-blinking');
    const onEnd = () => {
      widget.classList.remove('nibsy-blinking');
      eyeLeft.removeEventListener('animationend', onEnd);
      if (Math.random() < 0.2) {
        setTimeout(() => {
          widget.classList.add('nibsy-blinking');
          const onEnd2 = () => {
            widget.classList.remove('nibsy-blinking');
            eyeLeft.removeEventListener('animationend', onEnd2);
            scheduleBlink();
          };
          eyeLeft.addEventListener('animationend', onEnd2);
        }, 180);
      } else {
        scheduleBlink();
      }
    };
    eyeLeft.addEventListener('animationend', onEnd);
  }

  // --- Idle fidgets ---

  const thoughtTexts = ['hmm...', '🤔', '💡', '🔧', '🤖', '...?', '✨', '📦', 'ooh!'];

  const fidgets = [
    { name: 'thinking', duration: 3000, setup: () => {
      const t = document.getElementById('nw-thought-text');
      if (t) t.textContent = thoughtTexts[Math.floor(Math.random() * thoughtTexts.length)];
    }},
    { name: 'looking',  duration: 2500 },
    { name: 'waving',   duration: 1500 },
    { name: 'wiggling', duration: 1800 },
    { name: 'tilting',  duration: 2000 },
    { name: 'bouncing', duration: 1200 },
    { name: 'peeking',  duration: 2500 }
  ];

  let fidgetTimer = null;
  let fidgeting = false;
  let lastFidgetIndex = -1;

  function scheduleFidget() {
    if (fidgetTimer) clearTimeout(fidgetTimer);
    fidgetTimer = setTimeout(doFidget, 6000 + Math.random() * 6000);
  }

  function doFidget() {
    if (hidden || sleeping || menuOpen || giggling || surprising || fidgeting) {
      scheduleFidget();
      return;
    }
    let idx;
    do { idx = Math.floor(Math.random() * fidgets.length); } while (idx === lastFidgetIndex && fidgets.length > 1);
    lastFidgetIndex = idx;
    const f = fidgets[idx];
    fidgeting = true;
    if (f.setup) f.setup();
    widget.classList.add('nibsy-' + f.name);
    setTimeout(() => {
      widget.classList.remove('nibsy-' + f.name);
      fidgeting = false;
      scheduleFidget();
    }, f.duration);
  }

  function stopFidgets() {
    if (fidgetTimer) { clearTimeout(fidgetTimer); fidgetTimer = null; }
    fidgeting = false;
    fidgets.forEach(f => widget.classList.remove('nibsy-' + f.name));
  }

  // --- Speech ---

  function showSpeech(text, duration, isHTML, showNav) {
    if (menuOpen) return;
    if (speechTimer) clearTimeout(speechTimer);
    if (isHTML) {
      speechText.innerHTML = text;
      speech.classList.add('has-link');
    } else {
      speechText.textContent = text;
      speech.classList.remove('has-link');
    }
    if (showNav) {
      speech.classList.add('has-nav', 'has-link');
    } else {
      speech.classList.remove('has-nav');
    }
    speech.classList.add('visible');
    speechTimer = setTimeout(() => {
      speech.classList.remove('visible', 'has-link', 'has-nav');
      speechTimer = null;
    }, duration || 3000);
  }

  function hideSpeech() {
    if (speechTimer) clearTimeout(speechTimer);
    speech.classList.remove('visible', 'has-link', 'has-nav');
    speechTimer = null;
  }

  // --- Giggle ---

  const giggleMessages = [
    "Hehe, that tickles!",
    "Tee-hee!",
    "Stop it, that tickles!",
    "Hahaha!",
    "That's my antenna!"
  ];
  let giggling = false;

  function giggle() {
    if (giggling) return;
    giggling = true;
    resetInactivity();
    if (sleeping) wakeUp();
    closeMenu();
    widget.classList.add('nibsy-giggling');
    showSpeech(giggleMessages[Math.floor(Math.random() * giggleMessages.length)], 2000);
    setTimeout(() => {
      widget.classList.remove('nibsy-giggling');
      giggling = false;
    }, 800);
  }

  document.getElementById('nw-antenna').addEventListener('click', (e) => {
    e.stopPropagation();
    giggle();
  });

  // --- Menu ---

  function toggleMenu() {
    menuOpen = !menuOpen;
    if (menuOpen) {
      hideSpeech();
      menu.classList.add('open');
    } else {
      menu.classList.remove('open');
    }
  }

  function closeMenu() {
    menuOpen = false;
    menu.classList.remove('open');
  }

  let surprising = false;

  function surprised(callback) {
    if (surprising) { if (callback) callback(); return; }
    surprising = true;
    widget.classList.add('nibsy-surprised');
    setTimeout(() => {
      widget.classList.remove('nibsy-surprised');
      surprising = false;
      if (callback) callback();
    }, 500);
  }

  charEl.addEventListener('click', (e) => {
    e.stopPropagation();
    resetInactivity();
    if (sleeping) {
      wakeUp();
      return;
    }
    surprised(() => toggleMenu());
  });

  document.addEventListener('click', (e) => {
    if (menuOpen && !menu.contains(e.target) && !charEl.contains(e.target)) {
      closeMenu();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && menuOpen) closeMenu();
  });

  // --- Click tracking on recommendation links ---

  speech.addEventListener('click', (e) => {
    const link = e.target.closest('a[data-nibsy-id]');
    if (link) {
      trackClick(parseInt(link.dataset.nibsyId, 10), link.dataset.nibsyUrl);
    }
  });

  // --- What's Trending ---

  trendingBtn.addEventListener('click', async (e) => {
    e.stopPropagation();
    closeMenu();
    showSpeech('Checking what\'s hot...', 2000);
    const items = await fetchTrending();
    if (!items || items.length === 0) {
      showSpeech('Nothing trending right now — check back later!', 4000);
      return;
    }
    const links = items.slice(0, 3).map(t =>
      '<a href="' + t.url + '" data-nibsy-id="' + t.id + '" data-nibsy-url="' + t.url + '">' + t.title + '</a>'
    ).join('<br>');
    showSpeech('🔥 Trending now:<br>' + links, 8000, true);
  });

  // --- Show New Tip ---

  tipBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    closeMenu();
    showNavTip(true);
  });

  // --- Hide / Show ---

  hideBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    closeMenu();
    stopBlinking();
    stopEyeTracking();
    stopNavTips();
    stopFidgets();
    if (inactivityTimer) { clearInterval(inactivityTimer); inactivityTimer = null; }

    widget.classList.remove('nibsy-idle', 'nibsy-sleeping');
    sleeping = false;
    widget.classList.add('nibsy-exiting');

    setTimeout(() => {
      widget.classList.remove('nibsy-exiting');
      widget.classList.add('nibsy-hidden');
      hidden = true;
      localStorage.setItem('nibsy-hidden', 'true');
    }, 600);
  });

  showBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    hidden = false;
    sleeping = false;
    localStorage.setItem('nibsy-hidden', 'false');
    widget.classList.remove('nibsy-hidden');
    widget.classList.add('nibsy-entering');

    setTimeout(() => {
      widget.classList.remove('nibsy-entering');
      widget.classList.add('nibsy-idle');
      startBlinking();
      startEyeTracking();
      startInactivityWatch();
      showSpeech("I'm back! 👋", 2500);
    }, 1400);
  });

  // --- Init ---
  init();
})();
</script>
