{% assign nav = site.data.nav_projects %}
<nav class="navbar mt-0 mb-3 py-0 bg-nav">
    <div class="container-fluid">
        <ul class="nav me-auto my-0">
        {% for item in nav %}
        <li class="nav-item">
            <a href="{{ item.link }}" class="nav-link {% if page.url == item.link %}active{% endif %}">{% if item.icon %}<i class="{{ item.icon }} me-2"></i>{% endif %}{{ item.name }}</a>
        </li>
        {% endfor %}
        </ul>
    </div>
</nav>
