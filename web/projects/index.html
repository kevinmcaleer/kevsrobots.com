---
title: Projects Hub
layout: default
description: Browse maker projects — build guides, code, 3D models, and more
---

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Projects Hub</h1>
    <a href="/projects/editor.html" class="btn btn-primary"><i class="fas fa-plus me-1"></i> New Project</a>
  </div>

  <!-- Filters -->
  <div class="row mb-4">
    <div class="col-md-4">
      <input type="text" id="search-input" class="form-control" placeholder="Search projects...">
    </div>
    <div class="col-md-3">
      <select id="difficulty-filter" class="form-select">
        <option value="">All difficulties</option>
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>
    </div>
    <div class="col-md-3">
      <input type="text" id="tag-filter" class="form-control" placeholder="Filter by tag...">
    </div>
  </div>

  <!-- Project grid -->
  <div id="projects-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    <div class="text-center py-5 w-100">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="text-muted mt-2">Loading projects...</p>
    </div>
  </div>

  <div id="no-projects" class="text-center py-5 d-none">
    <i class="fas fa-folder-open fa-3x text-muted mb-3"></i>
    <h4 class="text-muted">No projects yet</h4>
    <p class="text-muted">Be the first to share a build!</p>
    <a href="/projects/editor.html" class="btn btn-primary">Create a Project</a>
  </div>
</div>

<script src="/assets/js/project-gradient.js"></script>
<script>
(function() {
  const API = 'https://projects.kevsrobots.com';
  const grid = document.getElementById('projects-grid');
  const noProjects = document.getElementById('no-projects');
  const searchInput = document.getElementById('search-input');
  const difficultyFilter = document.getElementById('difficulty-filter');
  const tagFilter = document.getElementById('tag-filter');

  const difficultyColors = {
    beginner: 'success',
    intermediate: 'warning',
    advanced: 'danger',
  };

  async function loadProjects() {
    const params = new URLSearchParams();
    if (searchInput.value) params.set('search', searchInput.value);
    if (difficultyFilter.value) params.set('difficulty', difficultyFilter.value);
    if (tagFilter.value) params.set('tag', tagFilter.value.toLowerCase());

    try {
      const resp = await fetch(API + '/api/projects?' + params.toString());
      if (!resp.ok) throw new Error('API error');
      const projects = await resp.json();

      if (projects.length === 0) {
        grid.innerHTML = '';
        noProjects.classList.remove('d-none');
        return;
      }

      noProjects.classList.add('d-none');
      grid.innerHTML = projects.map(p => `
        <div class="col">
          <a href="/projects/view.html?id=${p.id}" class="text-decoration-none">
            <div class="card h-100 border-0 shadow-sm card-hover">
              ${projectThumbnail(p, 180)}
              <div class="card-body">
                <h5 class="card-title text-dark">${p.title}</h5>
                <p class="card-text text-muted small">${p.short_description || ''}</p>
                <div class="d-flex flex-wrap gap-1 mb-2">
                  ${p.difficulty ? `<span class="badge bg-${difficultyColors[p.difficulty] || 'secondary'}">${p.difficulty}</span>` : ''}
                  ${p.estimated_minutes ? `<span class="badge bg-light text-dark"><i class="fas fa-clock"></i> ${p.estimated_minutes}min</span>` : ''}
                </div>
                <div class="d-flex flex-wrap gap-1">
                  ${(p.tags || []).slice(0, 4).map(t => `<span class="badge bg-light text-primary">${t}</span>`).join('')}
                </div>
              </div>
              <div class="card-footer bg-transparent border-0">
                <small class="text-muted">by ${p.author_username} &middot; ${new Date(p.created_at).toLocaleDateString()}</small>
              </div>
            </div>
          </a>
        </div>
      `).join('');

    } catch (e) {
      console.error('Failed to load projects:', e);
      grid.innerHTML = '<div class="text-center py-5 w-100"><p class="text-muted">Failed to load projects. The Projects API may be offline.</p></div>';
    }
  }

  let debounce;
  function debouncedLoad() {
    clearTimeout(debounce);
    debounce = setTimeout(loadProjects, 300);
  }

  searchInput.addEventListener('input', debouncedLoad);
  difficultyFilter.addEventListener('change', loadProjects);
  tagFilter.addEventListener('input', debouncedLoad);

  loadProjects();
})();
</script>
