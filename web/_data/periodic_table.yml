# The Periodic Table of Robotics
# ------------------------------
# Drives /periodic-table/ (the table grid) and the per-element pages in
# /web/_ptor/. Each element's `code` is its unique two-character symbol;
# `slug` is the lowercase code and must match the markdown filename in
# _ptor/. `row`/`col` place the tile on the 18-column grid (chemistry
# layout). `number` is the atomic number (reading order, bottom row last).
# `tags` feed the related-articles matcher in the ptor layout — keep them
# aligned with real blog-post tags and group names.

categories:
  - key: foundations
    label: Electronics Foundations
    color: "#e63946"
  - key: code
    label: Code & Software
    color: "#457b9d"
  - key: boards
    label: Boards & Brains
    color: "#7b2cbf"
  - key: signals
    label: Signals & Comms
    color: "#2a9d8f"
  - key: power
    label: Power & Motion
    color: "#f4a261"
  - key: sensors
    label: Sensors
    color: "#e9c46a"
  - key: intelligence
    label: Robot Intelligence
    color: "#ef476f"
  - key: making
    label: Making & Design
    color: "#38b000"
  - key: robots
    label: Robots & Builds
    color: "#8d99ae"

