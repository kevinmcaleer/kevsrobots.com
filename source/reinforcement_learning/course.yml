- name: Reinforcement Learning for Beginners
  author: Kevin McAleer
  date_created: 2026-06-13
  date_published: 2026-06-13
  layout: course
  cover: assets/cover.jpg
  groups:
      - robotics
      - micropython
      - ai
  description: >-
    Teach your robot to learn — instead of hardcoding every behaviour, use tabular Q-learning
    to let it discover through trial and error how to navigate obstacles on its own.
    Train a policy in a pure-Python grid-world simulation on your laptop, then export the
    frozen Q-table as JSON and deploy it to a Pico-powered differential-drive robot running MicroPython.
