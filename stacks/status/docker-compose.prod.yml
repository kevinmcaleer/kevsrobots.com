# Production deployment for the kevsrobots status service.
#
# Run with:
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in values (notably
#      STATUS_TUNNEL_TOKEN from Cloudflare Zero Trust).
#   2. Build and push the image on a build host:
#      docker build -t 192.168.2.1:5000/status:latest .
#      docker push 192.168.2.1:5000/status:latest

services:
  status:
    image: 192.168.2.1:5000/status:latest
    network_mode: host
    env_file: .env
    environment:
      - PORT=8210
      - STATUS_DB_PATH=/data/status.db
    volumes:
      # Bind-mount host ./data so the SQLite history survives container
      # restarts. Issue #203 requires the DB to live in a mounted folder.
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8210/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    network_mode: host
    # ``--edge-ip-version 4`` forces the QUIC socket to IPv4 only.
    # Without it, cloudflared binds a dual-stack [::] socket; after
    # a Pi power-cut IPv6 can come up without a working default
    # route, and every send fails with "sendmsg: network is
    # unreachable" indefinitely. v4-only keeps the tunnel working
    # regardless of host IPv6 state. Mirrors nibsy-api / projects-api.
    command: tunnel --no-autoupdate --edge-ip-version 4 run
    environment:
      - TUNNEL_TOKEN=${STATUS_TUNNEL_TOKEN}
    restart: unless-stopped
