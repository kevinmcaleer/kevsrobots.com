<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kev's Robots — System Status</title>
<meta name="description" content="Public status page for kevsrobots.com web services." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/dashboard.css?v={{ cache_bust }}" />
</head>
<body>
  <header>
    <div class="bar">
      <div class="brand">
        <img src="https://www.kevsrobots.com/assets/img/logo_red.png" alt="Kev's Robots" />
        <div>
          <div class="name">Kev's Robots</div>
          <div class="sub">System Status</div>
        </div>
      </div>
      <div class="meta">
        <span class="live"><i></i> Live</span>
        <span id="updated">Updated —</span>
      </div>
    </div>
  </header>

  <main>
    <div class="banner" id="banner">
      <div class="badge" id="banner-badge"></div>
      <div>
        <div class="title" id="banner-title">Loading status…</div>
        <div class="desc" id="banner-desc">Fetching the latest health data.</div>
      </div>
    </div>

    <div class="summary">
      <div id="summary-text"></div>
      <div>Last {{ retention_days }} days</div>
    </div>

    <div class="panel" id="panel"></div>

    <div class="legend">
      <span><i style="background:var(--up)"></i>Operational</span>
      <span><i style="background:var(--partial)"></i>Degraded</span>
      <span><i style="background:var(--down)"></i>Outage</span>
      <span style="margin-left:auto">Hover a bar for that day's detail. &middot; <a href="/status.json">JSON</a></span>
    </div>
  </main>

<script>
const N = {{ retention_days }};   // history window = the service's retention

// ---- status helpers -------------------------------------------------------
function statusFromFrac(f){ return f >= 99.5 ? 'up' : (f >= 50 ? 'partial' : 'down'); }
const COLOR  = { up:'#22a06b', partial:'#e6a817', down:'#e5484d', none:'#e2e5ea' };
const TINT   = { up:'#e7f6ee', partial:'#fbf2da', down:'#fbe3e4' };
const LABEL  = { up:'Operational', partial:'Degraded', down:'Major Outage' };
const WORD   = { up:'Operational', partial:'Degraded', down:'Outage' };
const BANNER = {
  up:      { t:'All Systems Operational', d:'Everything is running smoothly.',                a:'#22a06b', bg:'#ecf8f2', bd:'#cdeede', g:'✓' },
  partial: { t:'Partial Degradation',     d:'Some services are experiencing issues.',          a:'#e6a817', bg:'#fdf6e7', bd:'#f3e3b8', g:'!' },
  down:    { t:'Major Service Outage',    d:'One or more services are currently unavailable.', a:'#e5484d', bg:'#fdecec', bd:'#f6cfd0', g:'✕' },
};

function fmtUptime(avg){ return avg >= 99.995 ? '100%' : avg.toFixed(2) + '%'; }
function dayStatus(entry){
  // entry may be {status:'up'|'partial'|'down'} or {uptime:0..100}; null/undefined = no data
  if (!entry) return { st: 'none', frac: null };
  if (entry.status) return { st: entry.status, frac: typeof entry.uptime === 'number' ? entry.uptime : (entry.status === 'up' ? 100 : entry.status === 'partial' ? 95 : 0) };
  const f = typeof entry.uptime === 'number' ? entry.uptime : 100;
  return { st: statusFromFrac(f), frac: f };
}

// ---- render ---------------------------------------------------------------
function render(data){
  const services = data.services || [];
  const order = { up:0, partial:1, down:2 };
  let worst = 'up', opCount = 0;

  const panel = document.getElementById('panel');
  panel.innerHTML = '';

  services.forEach(s => {
    // normalise history to exactly N entries, oldest -> newest, padded with nulls
    const hist = (s.history || []).slice(-N);
    const pad = new Array(Math.max(0, N - hist.length)).fill(null).concat(hist);

    let sum = 0, cnt = 0;
    const barsHtml = pad.map((e, i) => {
      const { st, frac } = dayStatus(e);
      if (frac != null) { sum += frac; cnt++; }
      const dateLabel = e && e.date ? e.date : '';
      const pct = frac == null ? 'no data' : (frac >= 99.995 ? '100%' : frac.toFixed(2) + '%');
      const title = (dateLabel ? dateLabel + ' · ' : '') + (st === 'none' ? 'No data' : WORD[st] + ' · ' + pct + ' uptime');
      return `<span style="background:${COLOR[st]}" title="${title}"></span>`;
    }).join('');

    const cur = dayStatus(pad[pad.length - 1]).st;
    const curStatus = cur === 'none' ? 'up' : cur;
    if (curStatus === 'up') opCount++;
    if (order[curStatus] > order[worst]) worst = curStatus;

    const avg = cnt ? sum / cnt : 100;
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML =
      `<span class="dot" style="background:${COLOR[curStatus]};box-shadow:0 0 0 3px ${TINT[curStatus]}"></span>` +
      `<div class="svc"><div class="n">${s.name || ''}</div><div class="h">${s.host || ''}</div></div>` +
      `<div class="bars">${barsHtml}</div>` +
      `<span class="pct">${fmtUptime(avg)}</span>` +
      `<span class="pill" style="background:${TINT[curStatus]};color:${COLOR[curStatus]}">${LABEL[curStatus]}</span>`;
    panel.appendChild(row);
  });

  // banner
  const b = BANNER[worst];
  const banner = document.getElementById('banner');
  banner.style.background = b.bg;
  banner.style.borderColor = b.bd;
  document.getElementById('banner-badge').textContent = b.g;
  document.getElementById('banner-badge').style.background = b.a;
  document.getElementById('banner-title').textContent = b.t;
  document.getElementById('banner-desc').textContent = b.d;

  document.getElementById('summary-text').innerHTML =
    `<b style="color:var(--up)">${opCount}</b> of ${services.length} services operational`;

  // updated time
  if (data.updated) {
    const dt = new Date(data.updated);
    document.getElementById('updated').textContent =
      'Updated ' + dt.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }
}

// ---- error state ----------------------------------------------------------
function renderError(){
  const b = BANNER.down;
  const banner = document.getElementById('banner');
  banner.style.background = b.bg;
  banner.style.borderColor = b.bd;
  document.getElementById('banner-badge').textContent = '?';
  document.getElementById('banner-badge').style.background = '#9aa1ad';
  document.getElementById('banner-title').textContent = 'Status unavailable';
  document.getElementById('banner-desc').textContent = 'Could not load health data — retrying shortly.';
  document.getElementById('summary-text').innerHTML = '';
  document.getElementById('updated').textContent = 'Updated —';
}

// ---- load + auto-refresh --------------------------------------------------
async function load(){
  try {
    const res = await fetch('/status.json?ts=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error(res.status);
    render(await res.json());
  } catch (err) {
    renderError();
  }
}
load();
setInterval(load, 60000); // re-fetch every 60s
</script>
</body>
</html>
