# Swarm-mode deployment for the kevsrobots status service.
#
# Setup:
#   1. Copy .env.example to .env and fill in values.
#   2. Build and push the image:
#      docker build -t 192.168.2.1:5000/status:latest .
#      docker push 192.168.2.1:5000/status:latest
#   3. ``docker stack deploy`` does NOT read .env automatically — you
#      must source it first:
#         set -a; source .env; set +a
#         docker stack deploy --compose-file docker-stack.yml status

services:
  status:
    image: 192.168.2.1:5000/status:latest
    environment:
      - PORT=8210
      - STATUS_DB_PATH=/data/status.db
      - STATUS_SERVICES=${STATUS_SERVICES}
      - POLL_INTERVAL_MINUTES=${POLL_INTERVAL_MINUTES:-15}
      - RETENTION_DAYS=${RETENTION_DAYS:-30}
    volumes:
      - status_data:/data
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8210/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    # ``--edge-ip-version 4`` forces IPv4. See docker-compose.prod.yml
    # comment / CLAUDE.md for the rationale (a Pi power-cut can leave
    # IPv6 up without a route, wedging the tunnel).
    command: tunnel --no-autoupdate --edge-ip-version 4 run
    environment:
      - TUNNEL_TOKEN=${STATUS_TUNNEL_TOKEN}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  status_data:
