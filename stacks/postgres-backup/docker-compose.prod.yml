# postgres-backup — Docker Swarm stack that runs scheduled backups of
# the kevsrobots_cms database to an NFS-mounted directory on the NAS.
#
# Configuration lives in .env (copy from .env.example, fill in the
# placeholders, then run ./deploy.sh).
#
# Manual deploy (if you'd rather not use the wrapper):
#   set -a; source .env; set +a
#   sudo -E docker stack deploy -c docker-compose.prod.yml postgres-backup
#
# (the -E preserves the variables sourced from .env into the sudo
# environment — without it, docker stack deploy sees empty placeholders).
#
# Update / restart:
#   sudo docker service update --force postgres-backup_backup
#
# Tail logs:
#   sudo docker service logs -f postgres-backup_backup

version: "3.9"

services:
  backup:
    image: postgres:16-alpine
    # Run the script that's bind-mounted in via a swarm config. Keeps
    # us off the custom-image-build-and-push treadmill for a small
    # shell script that changes rarely.
    command: ["/bin/sh", "/usr/local/bin/backup.sh"]
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres_primary}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB:   ${POSTGRES_DB:-kevsrobots_cms}
      DAILY_KEEP:    ${DAILY_KEEP:-28}
      WEEKLY_KEEP:   ${WEEKLY_KEEP:-4}
    secrets:
      - postgres_user
      - postgres_password
    configs:
      - source: backup_script
        target: /usr/local/bin/backup.sh
        mode: 0755
    volumes:
      - backups_nas:/backups
    networks:
      - postgres
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 30s
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

configs:
  backup_script:
    file: ./backup.sh

secrets:
  postgres_user:
    external: true
  postgres_password:
    external: true

volumes:
  backups_nas:
    driver: local
    driver_opts:
      type: nfs
      # ``soft,timeo=600`` → don't hang forever if the NAS is briefly
      # unreachable; the script's catch-loop will retry on the next slot.
      o: "addr=${NAS_IP},nfsvers=${NFS_VERSION:-4},rw,soft,timeo=600"
      device: "${NAS_EXPORT_PATH}"

networks:
  postgres:
    external: true
    name: ${POSTGRES_NETWORK:-postgres_default}
