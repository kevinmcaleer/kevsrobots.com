# Production deployment with Cloudflare Tunnel sidecar.
#
# Deploy on each node:
#   1. Copy .env.example to .env and set TUNNEL_TOKEN
#   2. docker compose -f docker-compose.prod.yml up -d
#
# Each node registers as a connector for the same tunnel.
# Cloudflare load-balances across all active connectors.
# If a node goes down, traffic routes to the others automatically.

services:
  kevsrobots:
    image: 192.168.2.1:5000/kevsrobots:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3333/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      kevsrobots:
        condition: service_healthy
    network_mode: "service:kevsrobots"
