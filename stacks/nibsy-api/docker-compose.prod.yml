# Production deployment — run with:
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in values
#   2. Create the nibsy database on your Postgres server
#   3. Build and push the image:
#      docker build -t 192.168.2.1:5000/nibsy-api:latest .
#      docker push 192.168.2.1:5000/nibsy-api:latest

services:
  nibsy-api:
    image: 192.168.2.1:5000/nibsy-api:latest
    network_mode: host
    env_file: .env
    environment:
      - PORT=8200
      - NIBSY_DATA_DIR=/data
    volumes:
      - /home/kev/kevsrobots.com/web/_data:/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8200/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    network_mode: host
    # ``--edge-ip-version 4`` forces the QUIC socket to IPv4 only.
    # Without it, cloudflared binds a dual-stack [::] socket; after
    # a Pi power-cut IPv6 can come up without a working default
    # route, and every send fails with "sendmsg: network is
    # unreachable" indefinitely. v4-only keeps the tunnel working
    # regardless of host IPv6 state.
    command: tunnel --no-autoupdate --edge-ip-version 4 run
    environment:
      - TUNNEL_TOKEN=${NIBSY_TUNNEL_TOKEN}
    restart: unless-stopped
