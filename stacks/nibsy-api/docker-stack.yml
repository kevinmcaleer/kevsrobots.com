# Production deployment for Nibsy API on the Pi cluster.
#
# Setup:
#   1. Copy .env.example to .env and fill in values
#   2. Create the Postgres database:
#      psql -h 192.168.2.1 -p 5433 -U nibsy -c "CREATE DATABASE nibsy;"
#   3. Build and push the image:
#      docker build -t 192.168.2.1:5000/nibsy-api:latest .
#      docker push 192.168.2.1:5000/nibsy-api:latest
#   4. Deploy:
#      docker stack deploy --compose-file docker-stack.yml nibsy

services:
  nibsy-api:
    image: 192.168.2.1:5000/nibsy-api:latest
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - SITE_BASE_URL=${SITE_BASE_URL}
      - PAGE_COUNT_URL=${PAGE_COUNT_URL}
      - INGEST_SCHEDULE_HOUR=${INGEST_SCHEDULE_HOUR}
      - RECOMMENDATION_REFRESH_DAYS=${RECOMMENDATION_REFRESH_DAYS}
      - PORT=8200
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8200/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${NIBSY_TUNNEL_TOKEN}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
