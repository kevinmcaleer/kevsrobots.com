# Projects API — deploy with:
#   docker compose -f docker-compose.prod.yml up -d

services:
  projects-api:
    image: 192.168.2.1:5000/projects-api:latest
    network_mode: host
    env_file: .env
    environment:
      - PORT=8300
    volumes:
      - /home/kev/projects-uploads:/tmp/projects_uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8300/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    network_mode: host
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${PROJECTS_TUNNEL_TOKEN}
    restart: unless-stopped
