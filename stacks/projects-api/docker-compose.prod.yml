# Projects API — deploy with:
#   docker compose -f docker-compose.prod.yml up -d

services:
  projects-api:
    image: 192.168.2.1:5000/projects-api:latest
    network_mode: host
    env_file: .env
    environment:
      - PORT=8300
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8300/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    network_mode: host
    # ``--edge-ip-version 4`` forces the QUIC socket to IPv4 only.
    # Without it, cloudflared binds a dual-stack [::] socket; after
    # a Pi power-cut IPv6 can come up without a working default
    # route, and every send fails with "sendmsg: network is
    # unreachable" indefinitely. v4-only keeps the tunnel working
    # regardless of host IPv6 state.
    command: tunnel --no-autoupdate --edge-ip-version 4 run
    environment:
      - TUNNEL_TOKEN=${PROJECTS_TUNNEL_TOKEN}
    restart: unless-stopped
